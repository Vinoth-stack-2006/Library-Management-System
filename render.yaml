services:
  - type: web
    name: lms-app
    runtime: python
    pythonVersion: "3.11"
    buildCommand: "cd pr1 && pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput"
    startCommand: "bash run.sh"
    envVars:
      - key: PYTHONPATH
        value: "/opt/render/project/src/pr1"
      - key: DJANGO_SETTINGS_MODULE
        value: "pr1.settings"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*.render.com,localhost,127.0.0.1"
