services:
  - type: web
    name: lms-app
    runtime: python
    pythonVersion: "3.11"
    buildCommand: >
      cd pr1 &&
      pip install -r requirements.txt &&
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput
    startCommand: >
      cd pr1 &&
      gunicorn
      --workers 1
      --worker-class sync
      --bind 0.0.0.0:${PORT:-8000}
      --timeout 120
      --access-logfile -
      --error-logfile -
      pr1.wsgi:application
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src/pr1
      - key: DJANGO_SETTINGS_MODULE
        value: pr1.settings
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*.render.com,localhost,127.0.0.1"
      - key: PORT
        value: "8000"
