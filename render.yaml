services:
  - type: web
    name: lms-app
    runtime: python
    pythonVersion: "3.11"
    rootDirectory: pr1
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn pr1.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: "settings"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*.render.com,localhost,127.0.0.1"
