<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Book - Barcode Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        :root {
            --primary: #4361ee;
            --primary-light: #4895ef;
            --secondary: #3f37c9;
            --dark: #2b2d42;
            --light: #f8f9fa;
            --border-radius: 12px;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .form-card {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            width: 100%;
            max-width: 500px;
        }
        
        .card-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 20px 25px;
            border-bottom: none;
            text-align: center;
        }
        
        .card-header h2 {
            font-weight: 700;
            margin: 0;
            font-size: 1.5rem;
        }
        
        .card-body {
            padding: 20px;
        }
        
        .form-group {
            margin-bottom: 1.2rem;
        }
        
        .form-label {
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 6px;
            display: block;
            font-size: 0.9rem;
        }
        
        .form-control {
            border-radius: 8px;
            padding: 10px 12px;
            border: 1.5px solid #e1e5ee;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.15);
        }
        
        #camera {
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 250px;
            border: 1.5px solid #e1e5ee;
            margin-bottom: 1rem;
            position: relative;
            touch-action: pan-y;
        }
        
        #camera video, #camera canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
            border-radius: 8px;
        }
        
        /* Quagga canvas alignment fixes */
        #camera canvas.drawingBuffer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
        }
        
        .scanner-placeholder {
            text-align: center;
            color: white;
            padding: 15px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
        }
        
        .scanner-placeholder i {
            font-size: 2.5rem;
            margin-bottom: 0.8rem;
            color: var(--primary-light);
        }
        
        .scanner-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 120px;
            border: 2px solid #4361ee;
            border-radius: 8px;
            z-index: 5;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }
        
        .scanner-frame::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
        }
        
        .camera-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .swipe-hint {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 0.8rem;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 4px;
            z-index: 10;
        }
        
        .flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            opacity: 0;
            z-index: 5;
            pointer-events: none;
            border-radius: 8px;
        }
        
        .flash-active {
            animation: flash 0.3s;
        }
        
        @keyframes flash {
            0% { opacity: 0; }
            50% { opacity: 0.7; }
            100% { opacity: 0; }
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            padding: 10px 16px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 14px rgba(67, 97, 238, 0.25);
        }
        
        .btn-secondary {
            background: #6c757d;
            border: none;
            padding: 10px 16px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }
        
        .btn-camera {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            margin-top: 8px;
            transition: all 0.3s;
            font-size: 0.85rem;
        }
        
        .btn-camera:hover {
            background: var(--secondary);
        }
        
        .form-row {
            display: flex;
            flex-wrap: wrap;
            margin: 0 -8px;
        }
        
        .form-col {
            flex: 1;
            padding: 0 8px;
            min-width: 200px;
        }
        
        .scanner-status {
            display: flex;
            align-items: center;
            margin-top: 8px;
            font-size: 0.85rem;
            color: #6c757d;
        }
        
        .scanner-status i {
            margin-right: 6px;
        }
        
        .scanner-controls {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            justify-content: center;
        }
        
        /* Scanner alignment container */
        .scanner-container {
            position: relative;
            width: 100%;
            height: 250px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        
        @media (max-width: 768px) {
            .form-col {
                flex: 100%;
            }
            
            .card-body {
                padding: 15px;
            }
            
            .card-header {
                padding: 15px;
            }
            
            .scanner-frame {
                width: 85%;
            }
            
            .scanner-container {
                height: 220px;
            }
        }
        
        @media (max-width: 480px) {
            .form-card {
                max-width: 100%;
            }
            
            .scanner-container {
                height: 200px;
            }
            
            .scanner-controls {
                flex-direction: column;
            }
            
            .btn-camera {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="form-card">
    <!-- Header -->
    <div class="card-header">
        <h2><i class="fas fa-book-medical me-2"></i>Add New Book</h2>
    </div>

    <!-- Body -->
    <div class="card-body">
        <form method="post" id="bookForm">
            {% csrf_token %}

            <!-- Barcode Scanner Section -->
            <div class="form-group">
                <label class="form-label">Scanned Book Barcode</label>
                <input type="text" name="scanner" id="scannerInput" class="form-control" readonly placeholder="Barcode will appear here after scanning" required>
            </div>

            <!-- Camera Preview -->
            <div class="scanner-container">
                <div id="camera">
                    <div class="scanner-placeholder">
                        <i class="fas fa-camera"></i>
                        <p>Click "Start Camera" to begin barcode scanning</p>
                        <button type="button" id="startCamera" class="btn-camera">
                            <i class="fas fa-play me-2"></i>Start Camera
                        </button>
                    </div>
                    <div class="scanner-frame" style="display: none;"></div>
                    <div class="camera-indicator" style="display: none;">
                        <span id="cameraIcon">📷</span>
                        <span id="cameraType">Rear Camera</span>
                    </div>
                    <div class="swipe-hint" style="display: none;">Swipe left/right to switch camera</div>
                    <div class="flash" id="flashEffect"></div>
                </div>
            </div>
            
            <div class="scanner-controls" style="display: none;" id="cameraControls">
                <button type="button" id="switchCamera" class="btn-camera">
                    <i class="fas fa-sync-alt me-2"></i>Switch Camera
                </button>
                <button type="button" id="stopCamera" class="btn-camera">
                    <i class="fas fa-stop me-2"></i>Stop Camera
                </button>
            </div>
            
            <div class="scanner-status">
                <i class="fas fa-info-circle text-primary"></i>
                <span id="scannerMessage">Camera not started. Click "Start Camera" to begin scanning.</span>
            </div>

            <!-- Book Details -->
            <div class="form-group">
                <label class="form-label">Book Title</label>
                <input type="text" name="title" id="titleInput" class="form-control" placeholder="Enter book title" required>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <div class="form-group">
                        <label class="form-label">Author</label>
                        <input type="text" name="author" class="form-control" placeholder="Enter author name" required>
                    </div>
                </div>
                
                <div class="form-col">
                    <div class="form-group">
                        <label class="form-label">Publication Year</label>
                        <input type="number" name="year" class="form-control" placeholder="Enter publication year" min="1000" max="2100" required>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <div class="form-group">
                        <label class="form-label">Publisher</label>
                        <input type="text" name="publisher" class="form-control" placeholder="Enter publisher name" required>
                    </div>
                </div>
                
                <div class="form-col">
                    <div class="form-group">
                        <label class="form-label">Department</label>
                        <input type="text" name="department" class="form-control" placeholder="Enter department" required>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Abstract</label>
                <textarea name="abstract" class="form-control" placeholder="Enter book abstract" rows="3" required></textarea>
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-3 mt-4">
                <button type="submit" class="btn btn-primary flex-fill py-2">
                    <i class="fas fa-plus-circle me-2"></i>Add Book
                </button>
                <a href="{% url 'available' %}" class="btn btn-secondary flex-fill py-2">
                    <i class="fas fa-book-open me-2"></i>View Books
                </a>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    let quaggaInitialized = false;
    let currentFacingMode = "environment"; // Start with back camera
    let scannerActive = false;
    let startX = 0;
    
    const cameraElement = document.getElementById('camera');
    const startCameraButton = document.getElementById('startCamera');
    const stopCameraButton = document.getElementById('stopCamera');
    const switchCameraButton = document.getElementById('switchCamera');
    const cameraControls = document.getElementById('cameraControls');
    const scannerMessage = document.getElementById('scannerMessage');
    const scannerFrame = document.querySelector('.scanner-frame');
    const cameraIndicator = document.querySelector('.camera-indicator');
    const swipeHint = document.querySelector('.swipe-hint');
    const cameraType = document.getElementById('cameraType');
    const cameraIcon = document.getElementById('cameraIcon');
    const flashEffect = document.getElementById('flashEffect');
    
    // Function to update camera indicator
    function updateCameraIndicator() {
        if (currentFacingMode === "environment") {
            cameraType.textContent = "Rear Camera";
            cameraIcon.textContent = "📷";
        } else {
            cameraType.textContent = "Front Camera";
            cameraIcon.textContent = "📱";
        }
    }
    
    // Function to initialize Quagga scanner
    function initScanner(facingMode) {
        return new Promise((resolve, reject) => {
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: cameraElement,
                    constraints: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        facingMode: facingMode,
                        aspectRatio: { ideal: 1.333 }
                    }
                },
                decoder: {
                    readers: [
                        "code_128_reader",
                        "ean_reader",
                        "ean_8_reader",
                        "code_39_reader",
                        "code_39_vin_reader",
                        "codabar_reader",
                        "upc_reader",
                        "upc_e_reader"
                    ]
                },
                locate: true,
                numOfWorkers: navigator.hardwareConcurrency || 2,
                frequency: 10
            }, function(err) {
                if (err) {
                    reject(err);
                    return;
                }
                quaggaInitialized = true;
                
                // Fix canvas alignment after initialization
                setTimeout(() => {
                    const video = document.querySelector('#camera video');
                    const canvas = document.querySelector('#camera canvas');
                    if (video) {
                        video.style.objectFit = 'cover';
                        video.style.width = '100%';
                        video.style.height = '100%';
                    }
                    if (canvas) {
                        canvas.style.width = '100%';
                        canvas.style.height = '100%';
                        canvas.style.objectFit = 'cover';
                    }
                }, 100);
                
                resolve();
            });
        });
    }
    
    // Function to start the scanner
    async function startScanner() {
        if (scannerActive) return;
        
        try {
            scannerMessage.innerHTML = '<i class="fas fa-sync-alt fa-spin me-2"></i>Initializing camera...';
            
            await initScanner(currentFacingMode);
            
            Quagga.start();
            scannerActive = true;
            
            // Update UI
            cameraControls.style.display = 'flex';
            startCameraButton.style.display = 'none';
            scannerFrame.style.display = 'block';
            cameraIndicator.style.display = 'flex';
            swipeHint.style.display = 'block';
            updateCameraIndicator();
            scannerMessage.innerHTML = '<i class="fas fa-check-circle text-success me-2"></i>Scanner active - point camera at barcode';
            
        } catch (err) {
            console.error("Scanner initialization error:", err);
            scannerMessage.innerHTML = `<i class="fas fa-exclamation-triangle text-danger me-2"></i>Camera error: ${err.message}`;
            
            // Show placeholder with error
            cameraElement.innerHTML = `
                <div class="scanner-placeholder text-danger">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>Camera error: ${err.message}</p>
                    <button type="button" id="retryCamera" class="btn-camera">
                        <i class="fas fa-redo me-2"></i>Retry
                    </button>
                </div>
                <div class="scanner-frame" style="display: none;"></div>
                <div class="camera-indicator" style="display: none;"></div>
                <div class="swipe-hint" style="display: none;"></div>
                <div class="flash" id="flashEffect"></div>
            `;
            
            document.getElementById('retryCamera').addEventListener('click', startScanner);
        }
    }
    
    // Function to stop the scanner
    function stopScanner() {
        if (quaggaInitialized && scannerActive) {
            Quagga.stop();
            scannerActive = false;
            quaggaInitialized = false;
            
            // Update UI
            cameraControls.style.display = 'none';
            startCameraButton.style.display = 'block';
            scannerFrame.style.display = 'none';
            cameraIndicator.style.display = 'none';
            swipeHint.style.display = 'none';
            scannerMessage.innerHTML = '<i class="fas fa-info-circle text-primary me-2"></i>Camera stopped. Click "Start Camera" to begin scanning.';
            
            // Reset camera placeholder
            cameraElement.innerHTML = `
                <div class="scanner-placeholder">
                    <i class="fas fa-camera"></i>
                    <p>Click "Start Camera" to begin barcode scanning</p>
                    <button type="button" id="startCamera" class="btn-camera">
                        <i class="fas fa-play me-2"></i>Start Camera
                    </button>
                </div>
                <div class="scanner-frame" style="display: none;"></div>
                <div class="camera-indicator" style="display: none;">
                    <span id="cameraIcon">📷</span>
                    <span id="cameraType">Rear Camera</span>
                </div>
                <div class="swipe-hint" style="display: none;">Swipe left/right to switch camera</div>
                <div class="flash" id="flashEffect"></div>
            `;
            
            // Reattach event listeners
            document.getElementById('startCamera').addEventListener('click', startScanner);
        }
    }
    
    // Function to switch between front and back camera
    function switchCamera() {
        if (scannerActive) {
            stopScanner();
            currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
            setTimeout(startScanner, 500);
        }
    }
    
    // Touch events for swipe detection
    cameraElement.addEventListener('touchstart', function(e) {
        startX = e.touches[0].clientX;
    }, false);
    
    cameraElement.addEventListener('touchend', function(e) {
        if (!startX) return;
        
        const endX = e.changedTouches[0].clientX;
        const diffX = startX - endX;
        
        // If horizontal swipe with sufficient distance
        if (Math.abs(diffX) > 50) {
            switchCamera();
        }
        
        startX = 0;
    }, false);
    
    // Double-click to switch camera (for non-touch devices)
    cameraElement.addEventListener('click', function(e) {
        if (scannerActive && e.detail === 2) {
            switchCamera();
        }
    }, false);
    
    // Event listeners for camera controls
    startCameraButton.addEventListener('click', startScanner);
    stopCameraButton.addEventListener('click', stopScanner);
    switchCameraButton.addEventListener('click', switchCamera);
    
    // Barcode detection handler
    Quagga.onDetected(function(result) {
        if (!result || !result.codeResult) return;
        
        let code = result.codeResult.code;
        if (code) {
            document.getElementById("scannerInput").value = code;
            console.log("Scanned:", code);
            
            // Add flash effect for visual feedback
            flashEffect.classList.add('flash-active');
            setTimeout(() => {
                flashEffect.classList.remove('flash-active');
            }, 300);
            
            // Update scanner status
            scannerMessage.innerHTML = `<i class="fas fa-check-circle text-success me-2"></i>Barcode scanned: ${code}`;
            
            // Focus on title field
            document.getElementById("titleInput").focus();
        }
    });
    
    // Error handling for Quagga
    Quagga.onProcessed(function(result) {
        // This helps with visualization but can be removed if causing issues
        if (result) {
            const drawingCtx = Quagga.canvas.ctx.overlay;
            const drawingCanvas = Quagga.canvas.dom.overlay;
            
            if (drawingCtx && drawingCanvas) {
                drawingCtx.clearRect(0, 0, parseInt(drawingCanvas.getAttribute("width")), parseInt(drawingCanvas.getAttribute("height")));
                
                if (result.boxes) {
                    result.boxes.filter(function(box) {
                        return box !== result.box;
                    }).forEach(function(box) {
                        Quagga.ImageDebug.drawPath(box, {x: 0, y: 1}, drawingCtx, {color: "green", lineWidth: 2});
                    });
                }
                
                if (result.box) {
                    Quagga.ImageDebug.drawPath(result.box, {x: 0, y: 1}, drawingCtx, {color: "#00F", lineWidth: 2});
                }
                
                if (result.codeResult && result.codeResult.code) {
                    Quagga.ImageDebug.drawPath(result.line, {x: 'x', y: 'y'}, drawingCtx, {color: 'red', lineWidth: 3});
                }
            }
        }
    });

    // --- Prevent Enter from submitting early ---
    document.querySelectorAll("#bookForm input, #bookForm textarea").forEach(input => {
        input.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                e.preventDefault();
                const focusable = Array.from(document.querySelectorAll("#bookForm input, #bookForm textarea"));
                const index = focusable.indexOf(this);
                if (index > -1 && index + 1 < focusable.length) {
                    focusable[index + 1].focus();
                }
            }
        });
    });
});
</script>

</body>
</html>
