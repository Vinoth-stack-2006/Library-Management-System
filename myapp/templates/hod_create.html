<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create HOD | Staff Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #3498db;
            --secondary: #5dade2;
            --accent: #2ecc71;
            --light: #ebf5fb;
            --dark: #2c3e50;
            --success: #2ecc71;
            --danger: #e74c3c;
            --shadow: 0 10px 30px rgba(52, 152, 219, 0.15);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #e8f4fc 0%, #d1e7f7 100%);   
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark);
            line-height: 1.6;
            padding: 20px;
        }
        
        .form-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .form-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(52, 152, 219, 0.2);
        }
        
        .form-header {
            background: linear-gradient(135deg, var(--primary), #2980b9);
            color: white;
            padding: 2.5rem 2rem;
            text-align: center;
            border-bottom: none;
            position: relative;
            overflow: hidden;
        }
        
        .form-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite linear;
        }
        
        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }
        
        .form-header h2 {
            font-weight: 600;
            margin: 0;
            font-size: 1.8rem;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .form-body {
            padding: 2.5rem 2rem;
            background: #f8fbfe;
        }
        
        .form-label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--dark);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }
        
        .form-control {
            padding: 0.85rem 1rem 0.85rem 2.8rem;
            border-radius: 12px;
            border: 2px solid #d6eaf8;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            background: #f0f8ff;
            color: #2c3e50;
        }
        
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
            background: white;
            transform: translateY(-2px);
        }
        
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #3498db;
            z-index: 5;
        }
        
        .btn-submit {
            background: linear-gradient(135deg, var(--primary), #2980b9);
            color: white;
            border: none;
            padding: 0.85rem;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            font-size: 1rem;
            position: relative;
            overflow: hidden;
            width: 100%;
        }
        
        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .btn-submit:hover::before {
            left: 100%;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.4);
        }
        
        .btn-back {
            background: linear-gradient(135deg, #7fb3d5, #5499c7);
            color: white;
            border: none;
            padding: 0.85rem;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            font-size: 1rem;
            position: relative;
            overflow: hidden;
            width: 100%;
        }
        
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(123, 179, 213, 0.4);
        }
        
        .alert {
            border-radius: 12px;
            border: none;
            padding: 0.85rem 1rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .alert-success {
            background: #d5f4e6;
            color: var(--success);
            border-left: 4px solid var(--success);
        }
        
        .alert-error {
            background: #fadbd8;
            color: var(--danger);
            border-left: 4px solid var(--danger);
        }
        
        .form-control::placeholder {
            color: #7fb3d5;
        }
        
        .security-note {
            background: #e8f6f3;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            border-left: 4px solid #1abc9c;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }
        
        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .form-body {
                padding: 2rem 1.5rem;
            }
            
            body {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <!-- Header -->
        <div class="form-header">
            <h2><i class="fas fa-user-tie"></i> Create HOD</h2>
            <p class="mb-0 mt-2">Head of Department Registration</p>
        </div>

        <!-- Body -->
        <div class="form-body">
            
            <!-- Form -->
            <form method="POST">
                {% csrf_token %}
                
                <!-- HOD ID -->
                <div class="mb-4">
                    <label for="hod_id" class="form-label">
                        <i class="fas fa-id-card"></i> HOD ID
                    </label>
                    <div class="input-group">
                        <i class="fas fa-id-card input-icon"></i>
                        <input type="text" id="hod_id" name="hod_id" class="form-control" placeholder="e.g., 23BITH01" required>
                    </div>
                </div>

                <!-- Full Name -->
                <div class="mb-4">
                    <label for="name" class="form-label">
                        <i class="fas fa-user"></i> Full Name
                    </label>
                    <div class="input-group">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="name" name="name" class="form-control" placeholder="Enter full name" required>
                    </div>
                </div>

                <!-- Email -->
                <div class="mb-4">
                    <label for="email" class="form-label">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <div class="input-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="email" name="email" class="form-control" placeholder="Enter email address" required>
                    </div>
                </div>

                <!-- Department -->
                <div class="mb-4">
                    <label for="department" class="form-label">
                        <i class="fas fa-building"></i> Department
                    </label>
                    <div class="input-group">
                        <i class="fas fa-building input-icon"></i>
                        <input type="text" id="department" name="department" class="form-control" placeholder="Department (Optional)">
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-4">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-submit">
                    <i class="fas fa-user-plus me-2"></i> Create HOD Account
                </button>
                
                <!-- Back Button -->
                <button type="button" class="btn-back" onclick="location.href='/admin-dashboard/'">
                    <i class="fas fa-arrow-left me-2"></i> Back to Dashboard
                </button>
            </form>
            
            <!-- Security Note -->
            <div class="security-note">
                <i class="fas fa-shield-alt"></i>
                <div>
                    <strong>Secure Registration</strong><br>
                    All information is encrypted and securely stored.
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
