<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Student (Scanner Integrated)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        #camera {
            width: 100%;
            max-width: 700px;
            height: 400px;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            margin: 0 auto;
            position: relative;
            touch-action: pan-y;
        }
        
        #camera video,
        #camera canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }
        
        .camera-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .swipe-hint {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 12px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 5px;
            z-index: 10;
        }
        
        .scanner-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
        
        .scanner-controls button {
            border-radius: 6px;
            padding: 8px 15px;
            font-size: 0.9rem;
        }
        
        .flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            opacity: 0;
            z-index: 5;
            pointer-events: none;
        }
        
        .flash-active {
            animation: flash 0.3s;
        }
        
        @keyframes flash {
            0% { opacity: 0; }
            50% { opacity: 0.7; }
            100% { opacity: 0; }
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        @media (max-width: 768px) {
            #camera {
                height: 300px;
            }
            
            .container {
                padding: 15px;
            }
        }
        
        @media (max-width: 576px) {
            #camera {
                height: 250px;
            }
            
            .scanner-controls {
                flex-direction: column;
            }
            
            .scanner-controls button {
                width: 100%;
            }
        }
    </style>
</head>
<body class="bg-light">

<div class="container my-5">
    <div class="card shadow-lg p-4">
        <h2 class="mb-4 text-center text-primary">👨‍🎓 Add New Student</h2>

       <form method="post" action="/save_student/" >
    {% csrf_token %}

    <!-- Scanner -->
    <div class="text-center mb-3">
        <label class="form-label fw-bold d-block mb-2">Live Barcode Scanner</label>
        <div id="camera">
            <span class="text-white position-absolute top-50 start-50 translate-middle">📷 Initializing camera...</span>
            <div class="camera-indicator">
                <span id="cameraIcon">📷</span>
                <span id="cameraType">Rear Camera</span>
            </div>
            <div class="swipe-hint">Swipe left/right to switch camera</div>
            <div class="flash" id="flashEffect"></div>
        </div>
        
        <div class="scanner-controls">
            <button type="button" id="switchCameraBtn" class="btn btn-outline-primary">
                <span>🔄 Switch Camera</span>
            </button>
        </div>
        
        <small class="text-muted d-block mt-2">Scan the Student ID barcode</small>
    </div>

    <!-- Student ID -->
    <div class="mb-3">
        <label class="form-label">Scanned Student ID</label>
        <input type="text" name="student_id" id="scannerInput" class="form-control" readonly required>
    </div>

    <!-- Name -->
    <div class="mb-3">
        <label class="form-label">Student Name</label>
        <input type="text" name="student_name" id="nameInput" class="form-control" placeholder="Enter student name" required>
    </div>

    <!--e-mail-->
    <div class="mb-3">
       <label class="form-label">Student Email</label>
       <input type="email" name="student_email" class="form-control" placeholder="Enter student email" required>
    </div>

    <!-- Password -->
    <div class="mb-3">
        <label class="form-label">Student Password</label>
        <input type="password" name="student_Password" class="form-control" placeholder="Enter student password" required>
    </div>

    <!-- Submit Button -->
    <div class="d-flex justify-content-between mt-4">
        <button type="submit" class="btn btn-success px-4">💾 Submit & Continue</button>
    </div>

</form>

    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    let lastResult = null;
    let currentCamera = "environment"; // Default to rear camera
    let isSwitching = false;
    let startX = 0;
    
    const cameraElement = document.getElementById('camera');
    const cameraTypeElement = document.getElementById('cameraType');
    const cameraIconElement = document.getElementById('cameraIcon');
    const switchCameraBtn = document.getElementById('switchCameraBtn');
    const flashEffect = document.getElementById('flashEffect');
    
    // Initialize Quagga with the current camera
    function initScanner(cameraMode) {
        if (isSwitching) return;
        isSwitching = true;
        
        // Stop any existing scanner
        if (typeof Quagga !== 'undefined' && Quagga.initialized) {
            Quagga.stop();
        }
        
        // Update camera indicator
        if (cameraMode === "environment") {
            cameraTypeElement.textContent = "Rear Camera";
            cameraIconElement.textContent = "📷";
        } else {
            cameraTypeElement.textContent = "Front Camera";
            cameraIconElement.textContent = "📱";
        }
        
        Quagga.init({
            inputStream: {
                type: "LiveStream",
                target: cameraElement,
                constraints: {
                    width: { min: 640 },
                    height: { min: 480 },
                    facingMode: cameraMode,
                    aspectRatio: { ideal: 1.333 }
                }
            },
            decoder: {
                readers: ["code_128_reader", "code_39_reader"],
            },
            locator: {
                patchSize: "medium",
                halfSample: true
            },
            locate: true
        }, function(err) {
            isSwitching = false;
            if (err) {
                console.error("Quagga init error:", err);
                alert("Camera initialization failed. Please allow camera permissions.");
                return;
            }
            Quagga.start();
        });
    }
    
    // Switch camera function
    function switchCamera() {
        currentCamera = currentCamera === "environment" ? "user" : "environment";
        initScanner(currentCamera);
    }
    
    // Touch events for swipe detection
    cameraElement.addEventListener('touchstart', function(e) {
        startX = e.touches[0].clientX;
    }, false);
    
    cameraElement.addEventListener('touchend', function(e) {
        if (!startX) return;
        
        const endX = e.changedTouches[0].clientX;
        const diffX = startX - endX;
        
        // If horizontal swipe with sufficient distance
        if (Math.abs(diffX) > 50) {
            switchCamera();
        }
        
        startX = 0;
    }, false);
    
    // Click event for camera switching (fallback for non-touch devices)
    cameraElement.addEventListener('click', function(e) {
        // Only trigger if not already switching and if it's a double click
        if (!isSwitching && e.detail === 2) {
            switchCamera();
        }
    }, false);
    
    // Button event listener
    switchCameraBtn.addEventListener('click', switchCamera);
    
    // Initialize with default camera
    initScanner(currentCamera);
    
    // Barcode detection
    Quagga.onDetected(function(result) {
        let code = result.codeResult.code;
        if (code && code !== lastResult) {
            lastResult = code;
            document.getElementById("scannerInput").value = code;
            
            // Add flash effect for visual feedback
            flashEffect.classList.add('flash-active');
            setTimeout(() => {
                flashEffect.classList.remove('flash-active');
            }, 300);
        }
    });
});
</script>

</body>
</html>
