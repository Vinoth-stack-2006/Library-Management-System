<!DOCTYPE html>
<html>
<head>
    <title>HOD List</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            padding: 30px; 
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        table {
            border-collapse: collapse; 
            width: 100%; 
            margin: 20px 0;
            background: white; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        th, td {
            padding: 15px; 
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }
        th { 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: white; 
            font-weight: bold;
            text-transform: uppercase;
        }
        tr:nth-child(even) { 
            background: #f9fafb; 
        }
        tr:hover {
            background: #e0e7ff;
            transition: 0.3s;
        }
        .no-data {
            text-align: center;
            color: #6b7280;
            font-style: italic;
        }
        .back-btn {
            background: #6b7280;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: #4b5563;
        }
        .add-btn {
            background: #10b981;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            margin-left: 10px;
            transition: 0.3s;
        }
        .add-btn:hover {
            background: #059669;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🏛 HOD List</h2>
        
        <div>
            <a href="/admin-dashboard/" class="back-btn">← Back to Dashboard</a>
            <a href="/hod/create/" class="add-btn">+ Add New HOD</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th>HOD ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Department</th>
                </tr>
            </thead>
            <tbody>
                {% for hod in hods %}
                <tr>
                    <td><strong>{{ hod.hod_id }}</strong></td>
                    <td>{{ hod.name }}</td>
                    <td>{{ hod.email }}</td>
                    <td>{{ hod.department|default:"Not specified" }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="no-data">No HODs available</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <div style="text-align: center; margin-top: 20px;">
            <p><strong>Total HODs: {{ hods.count }}</strong></p>
        </div>
    </div>
</body>
</html>
