<!DOCTYPE html>
<html>
<head>
    <title>Create Staff</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f3f4f6; padding: 30px; }
        .form-container {
            max-width: 400px; margin: auto; background: white; padding: 20px;
            border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        input, button {
            width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            background: #4f46e5; color: white; font-weight: bold; border: none;
            cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #4338ca; }
        .msg { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Create Staff</h2>

        {% if messages %}
          {% for msg in messages %}
            <p class="{% if msg.tags %}{{ msg.tags }}{% endif %}">{{ msg }}</p>
          {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="staff_id" placeholder="Staff ID" required>
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Create</button>
        </form>
    </div>
</body>
</html>
