{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Barcode Generator | Library Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #3498db;
      --secondary: #5dade2;
      --accent: #2ecc71;
      --light: #ebf5fb;
      --dark: #2c3e50;
      --success: #2ecc71;
      --danger: #e74c3c;
      --warning: #f39c12;
      --shadow: 0 10px 30px rgba(52, 152, 219, 0.15);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #e8f4fc 0%, #d1e7f7 100%);   
      font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--dark);
      line-height: 1.6;
      padding: 20px;
    }
    
    .form-container {
      width: 100%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    
    .form-container:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(52, 152, 219, 0.2);
    }
    
    .form-header {
      background: linear-gradient(135deg, var(--primary), #2980b9);
      color: white;
      padding: 2.5rem 2rem;
      text-align: center;
      border-bottom: none;
      position: relative;
      overflow: hidden;
    }
    
    .form-header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: rotate(45deg);
      animation: shine 3s infinite linear;
    }
    
    @keyframes shine {
      0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }
    
    .form-header h2 {
      font-weight: 600;
      margin: 0;
      font-size: 1.8rem;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .form-body {
      padding: 2.5rem 2rem;
      background: #f8fbfe;
    }
    
    .form-label {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--dark);
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .form-control {
      padding: 0.85rem 1rem;
      border-radius: 12px;
      border: 2px solid #d6eaf8;
      transition: all 0.3s ease;
      font-size: 0.95rem;
      background: #f0f8ff;
      color: #2c3e50;
    }
    
    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
      background: white;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #2980b9);
      color: white;
      border: none;
      padding: 0.85rem;
      font-weight: 600;
      border-radius: 12px;
      transition: all 0.3s ease;
      font-size: 1rem;
      position: relative;
      overflow: hidden;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 1rem;
    }
    
    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }
    
    .btn-primary:hover::before {
      left: 100%;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(52, 152, 219, 0.4);
    }
    
    .barcode-section {
      background: linear-gradient(135deg, #f0f8ff, #e8f4fc);
      border-radius: 15px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 2px solid #d6eaf8;
    }
    
    .radio-group {
      display: flex;
      gap: 1.5rem;
      margin-top: 0.5rem;
    }
    
    .form-check {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .form-check-input {
      width: 1.2rem;
      height: 1.2rem;
      margin-top: 0;
      border: 2px solid #d6eaf8;
    }
    
    .form-check-input:checked {
      background-color: var(--primary);
      border-color: var(--primary);
    }
    
    .form-check-label {
      font-weight: 500;
      color: var(--dark);
      cursor: pointer;
    }
    
    .info-note {
      background: #e8f6f3;
      border-radius: 10px;
      padding: 15px;
      margin-top: 20px;
      border-left: 4px solid #1abc9c;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
    }
    
    /* Responsive Adjustments */
    @media (max-width: 768px) {
      .form-body {
        padding: 2rem 1.5rem;
      }
      
      body {
        padding: 15px;
      }
      
      .radio-group {
        flex-direction: column;
        gap: 1rem;
      }
    }
  </style>
  <script>
    function toggleBarcodeFields() {
      const type = document.querySelector('input[name="barcode_type"]:checked').value;
      if (type === 'single') {
        document.getElementById('single-barcode').style.display = 'block';
        document.getElementById('range-barcode').style.display = 'none';
        document.getElementById('barcode_number').required = true;
        document.getElementById('start_number').required = false;
        document.getElementById('end_number').required = false;
      } else {
        document.getElementById('single-barcode').style.display = 'none';
        document.getElementById('range-barcode').style.display = 'block';
        document.getElementById('barcode_number').required = false;
        document.getElementById('start_number').required = true;
        document.getElementById('end_number').required = true;
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      toggleBarcodeFields();
      
      // Add input validation
      const startNumber = document.getElementById('start_number');
      const endNumber = document.getElementById('end_number');
      
      if (startNumber && endNumber) {
        endNumber.addEventListener('change', function() {
          if (parseInt(startNumber.value) >= parseInt(endNumber.value)) {
            alert('End number must be greater than start number');
            endNumber.value = '';
            endNumber.focus();
          }
        });
      }
    });
  </script>
</head>
<body>

<div class="form-container">
  <!-- Header -->
  <div class="form-header">
    <h2><i class="fas fa-barcode"></i> Barcode Generator</h2>
    <p class="mb-0 mt-2">Generate barcodes for library books</p>
  </div>

  <!-- Body -->
  <div class="form-body">
    <form method="post" action="{% url 'generate_barcode' %}">
      {% csrf_token %}

      <!-- Title -->
      <div class="mb-4">
        <label for="title" class="form-label">
          <i class="fas fa-heading"></i> Book Title
        </label>
        <input type="text" class="form-control" id="title" name="title" placeholder="Enter book title" required>
      </div>

      <!-- Barcode Type Selection -->
      <div class="barcode-section">
        <label class="form-label">
          <i class="fas fa-cogs"></i> Barcode Type
        </label>
        <div class="radio-group">
          <div class="form-check">
            <input class="form-check-input" type="radio" name="barcode_type" id="single" value="single" checked onchange="toggleBarcodeFields()">
            <label class="form-check-label" for="single">
              <i class="fas fa-barcode me-1"></i> Single Barcode
            </label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="barcode_type" id="multiple" value="multiple" onchange="toggleBarcodeFields()">
            <label class="form-check-label" for="multiple">
              <i class="fas fa-layer-group me-1"></i> Multiple Barcodes
            </label>
          </div>
        </div>
      </div>

      <!-- Single Barcode Input -->
      <div id="single-barcode" class="barcode-section">
        <label for="barcode_number" class="form-label">
          <i class="fas fa-hashtag"></i> Barcode Number
        </label>
        <input type="text" class="form-control" id="barcode_number" name="barcode_number" placeholder="Enter unique barcode number">
      </div>

      <!-- Multiple Barcode Input -->
      <div id="range-barcode" class="barcode-section" style="display:none;">
        <div class="mb-3">
          <label for="start_number" class="form-label">
            <i class="fas fa-play"></i> Start Number
          </label>
          <input type="number" class="form-control" id="start_number" name="start_number" placeholder="Enter starting number">
        </div>
        
        <div>
          <label for="end_number" class="form-label">
            <i class="fas fa-stop"></i> End Number
          </label>
          <input type="number" class="form-control" id="end_number" name="end_number" placeholder="Enter ending number">
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn-primary">
        <i class="fas fa-qrcode me-2"></i> Generate Barcode
      </button>
    </form>
    
    <!-- Information Note -->
    <div class="info-note">
      <i class="fas fa-info-circle"></i>
      <div>
        <strong>Barcode Generation</strong><br>
        Generate single barcodes or multiple barcodes in sequence for efficient library management.
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
