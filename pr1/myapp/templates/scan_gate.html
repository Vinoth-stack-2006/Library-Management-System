<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Book - Internal Barcode Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        #camera {
            width: 100%;
            height: 300px;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            touch-action: pan-y;
        }
        
        #camera video,
        #camera canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .camera-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .swipe-hint {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 12px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 5px;
            z-index: 10;
        }
        
        .scanner-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
        
        .scanner-controls button {
            border-radius: 6px;
            padding: 8px 15px;
            font-size: 0.9rem;
        }
        
        .flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            opacity: 0;
            z-index: 5;
            pointer-events: none;
        }
        
        .flash-active {
            animation: flash 0.3s;
        }
        
        @keyframes flash {
            0% { opacity: 0; }
            50% { opacity: 0.7; }
            100% { opacity: 0; }
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            font-weight: 600;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-outline-primary {
            border-color: #667eea;
            color: #667eea;
        }
        
        .btn-outline-primary:hover {
            background-color: #667eea;
            border-color: #667eea;
        }
        
        @media (max-width: 576px) {
            .scanner-controls {
                flex-direction: column;
            }
            
            .scanner-controls button {
                width: 100%;
            }
        }
    </style>
</head>
<body class="bg-light">

<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg p-4" style="max-width: 600px; width: 100%;">
        <h2 class="text-center mb-4">📚 Scan Your Book ID</h2>

        <form method="post" id="bookForm">
            {% csrf_token %}

            <!-- Barcode Result -->
            <div class="mb-3">
                <label class="form-label">Scanned Book Barcode</label>
                <input type="text" name="scanner" id="scannerInput" class="form-control" readonly required>
            </div>

            <!-- Camera Preview -->
            <div class="mb-3">
                <div id="camera" class="border rounded">
                    <span class="text-white position-absolute top-50 start-50 translate-middle">📷 Initializing camera...</span>
                    <div class="camera-indicator">
                        <span id="cameraIcon">📷</span>
                        <span id="cameraType">Rear Camera</span>
                    </div>
                    <div class="swipe-hint">Swipe left/right to switch camera</div>
                    <div class="flash" id="flashEffect"></div>
                </div>
                
                <div class="scanner-controls">
                    <button type="button" id="switchCameraBtn" class="btn btn-outline-primary">
                        <span>🔄 Switch Camera</span>
                    </button>
                </div>
            </div>

            <!-- Book Title -->
            <div class="mb-3">
                <input type="text" name="title" id="titleInput" class="form-control" placeholder="Book Name" required>
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary w-50">➕ Add Book</button>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    let currentCamera = "environment"; // Default to rear camera
    let isSwitching = false;
    let startX = 0;
    let lastResult = null;
    
    const cameraElement = document.getElementById('camera');
    const cameraTypeElement = document.getElementById('cameraType');
    const cameraIconElement = document.getElementById('cameraIcon');
    const switchCameraBtn = document.getElementById('switchCameraBtn');
    const flashEffect = document.getElementById('flashEffect');
    
    // Initialize Quagga with the current camera
    function initScanner(cameraMode) {
        if (isSwitching) return;
        isSwitching = true;
        
        // Stop any existing scanner
        if (typeof Quagga !== 'undefined' && Quagga.initialized) {
            Quagga.stop();
        }
        
        // Update camera indicator
        if (cameraMode === "environment") {
            cameraTypeElement.textContent = "Rear Camera";
            cameraIconElement.textContent = "📷";
        } else {
            cameraTypeElement.textContent = "Front Camera";
            cameraIconElement.textContent = "📱";
        }
        
        Quagga.init({
            inputStream: {
                type: "LiveStream",
                target: cameraElement,
                constraints: { 
                    width: 400, 
                    height: 300, 
                    facingMode: cameraMode 
                }
            },
            decoder: { 
                readers: ["code_128_reader", "code_39_reader"] 
            },
            locate: true,
            numOfWorkers: navigator.hardwareConcurrency || 2,
            frequency: 10
        }, function(err) {
            isSwitching = false;
            if (err) { 
                console.error("Quagga init error:", err); 
                alert("Camera initialization failed. Please allow camera permissions.");
                return; 
            }
            Quagga.start();
        });
    }
    
    // Switch camera function
    function switchCamera() {
        currentCamera = currentCamera === "environment" ? "user" : "environment";
        initScanner(currentCamera);
    }
    
    // Touch events for swipe detection
    cameraElement.addEventListener('touchstart', function(e) {
        startX = e.touches[0].clientX;
    }, false);
    
    cameraElement.addEventListener('touchend', function(e) {
        if (!startX) return;
        
        const endX = e.changedTouches[0].clientX;
        const diffX = startX - endX;
        
        // If horizontal swipe with sufficient distance
        if (Math.abs(diffX) > 50) {
            switchCamera();
        }
        
        startX = 0;
    }, false);
    
    // Double-click to switch camera (for non-touch devices)
    cameraElement.addEventListener('click', function(e) {
        if (!isSwitching && e.detail === 2) {
            switchCamera();
        }
    }, false);
    
    // Button event listener
    switchCameraBtn.addEventListener('click', switchCamera);
    
    // Initialize scanner if camera is supported
    if (navigator.mediaDevices && typeof navigator.mediaDevices.getUserMedia === "function") {
        initScanner(currentCamera);
    } else {
        alert("Camera not supported or permission denied.");
    }

    // Barcode detection
    Quagga.onDetected(function(result) {
        if (!result || !result.codeResult) return;
        let code = result.codeResult.code;
        if (code && code !== lastResult) {
            document.getElementById("scannerInput").value = code;
            lastResult = code;
            console.log("Scanned:", code);
            
            // Add flash effect for visual feedback
            flashEffect.classList.add('flash-active');
            setTimeout(() => {
                flashEffect.classList.remove('flash-active');
            }, 300);
            
            document.getElementById("titleInput").focus();
        }
    });
});
</script>

</body>
</html>
