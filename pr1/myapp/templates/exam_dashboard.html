{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Government Exam Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'exams/styles.css' %}">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .dashboard-title {
            text-align: center;
            margin: 40px 0 20px 0;
            font-size: 36px;
            font-weight: bold;
            color: #02475e;
            text-shadow: 1px 1px 2px #ccc;
        }

        .exam-card {
            border-radius: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
        }

        .exam-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .exam-card .card-title {
            font-size: 22px;
            font-weight: bold;
            color: #02475e;
        }

        .exam-card .card-text {
            font-size: 16px;
            color: #555;
            min-height: 60px;
        }

        .btn-primary {
            background-color: #02475e;
            border: none;
        }

        .btn-primary:hover {
            background-color: #01658c;
        }

        .row-cols-md-3 {
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 class="dashboard-title">Government Exam Dashboard</h1>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        {% for exam in exams %}
        <div class="col">
            <div class="card exam-card h-100 shadow-sm">
                <div class="card-body text-center">
                    <h5 class="card-title">{{ exam.name }}</h5>
                    <p class="card-text">{{ exam.description }}</p>
                    <a href="{% url 'subbranches' exam.id %}" class="btn btn-primary">View Subbranches</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
