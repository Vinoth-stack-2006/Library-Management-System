<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Book - Internal Barcode Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --accent: #1abc9c;
            --light-bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
            --border-light: #e9ecef;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 8px 25px rgba(0, 0, 0, 0.12);
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
        }
        
        .card {
            border-radius: 16px;
            border: none;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        
        .card-header {
            background: linear-gradient(135deg, var(--primary), #3d5a80);
            color: white;
            padding: 25px 30px;
            border-bottom: none;
        }
        
        .card-body {
            padding: 30px;
        }
        
        h2 {
            font-weight: 700;
            margin: 0;
            font-size: 1.8rem;
        }
        
        .form-label {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        
        .form-control {
            border-radius: 8px;
            padding: 12px 15px;
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
            border-color: var(--secondary);
        }
        
        .btn {
            border-radius: 8px;
            padding: 12px 25px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--secondary), #5dade2);
            border: none;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--accent), #48c9b0);
            border: none;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(26, 188, 156, 0.4);
        }
        
        .scanner-container {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 0;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-light);
            overflow: hidden;
        }
        
        .scanner-header {
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid var(--border-light);
        }
        
        #camera {
            width: 100%;
            height: 400px;
            background-color: #000;
            position: relative;
            overflow: hidden;
        }
        
        #camera video,
        #camera canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }
        
        .scanner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
        }
        
        .scanner-frame {
            width: 80%;
            height: 60%;
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 8px;
            position: relative;
        }
        
        .scanner-frame::before,
        .scanner-frame::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: white;
            border-style: solid;
        }
        
        .scanner-frame::before {
            top: -2px;
            left: -2px;
            border-width: 3px 0 0 3px;
            border-radius: 8px 0 0 0;
        }
        
        .scanner-frame::after {
            bottom: -2px;
            right: -2px;
            border-width: 0 3px 3px 0;
            border-radius: 0 0 8px 0;
        }
        
        .scanner-status {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 0.9rem;
            z-index: 20;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px;
        }
        
        .form-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-light);
        }
        
        .scanner-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px 20px;
            background: #f8f9fa;
            border-top: 1px solid var(--border-light);
        }
        
        .scanner-controls button {
            border-radius: 6px;
            padding: 8px 15px;
            font-size: 0.9rem;
        }
        
        .input-group-text {
            background-color: #f8f9fa;
            border: 1px solid var(--border-light);
        }
        
        @media (max-width: 768px) {
            .card-body {
                padding: 20px;
            }
            
            h2 {
                font-size: 1.5rem;
            }
            
            #camera {
                height: 350px;
            }
        }
        
        @media (max-width: 576px) {
            body {
                padding: 15px;
            }
            
            .card-body {
                padding: 15px;
            }
            
            #camera {
                height: 300px;
            }
            
            .scanner-controls {
                flex-direction: column;
            }
        }
        
        /* Full screen scanner mode */
        .fullscreen-scanner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1000;
            background: black;
        }
        
        .fullscreen-scanner #camera {
            width: 100%;
            height: 100%;
        }
        
        .fullscreen-controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 1010;
        }
        
        .fullscreen-controls button {
            padding: 12px 25px;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container my-4">
        <div class="card">
            <div class="card-header text-center">
                <h2><i class="fas fa-book me-2"></i>Add New Book</h2>
                <p class="mb-0 mt-2 opacity-75">Register book with barcode scanning capability</p>
            </div>
            
            <div class="card-body">
                <form method="post" id="bookForm">
                    {% csrf_token %}
                    
                    <!-- Scanner Section -->
                    <div class="scanner-container">
                        <div class="scanner-header">
                            <label class="form-label d-block text-center mb-0">
                                <i class="fas fa-barcode me-2"></i>Book Barcode Scanner
                            </label>
                        </div>
                        
                        <div id="camera">
                            <div class="scanner-overlay">
                                <div class="scanner-frame"></div>
                            </div>
                            <div class="scanner-status">
                                <span id="scannerStatus">Initializing camera...</span>
                            </div>
                        </div>
                        
                        <div class="scanner-controls">
                            <button type="button" id="startScanner" class="btn btn-primary">
                                <i class="fas fa-play me-1"></i> Start Scanner
                            </button>
                            <button type="button" id="stopScanner" class="btn btn-secondary" disabled>
                                <i class="fas fa-stop me-1"></i> Stop Scanner
                            </button>
                            <button type="button" id="fullscreenScanner" class="btn btn-info">
                                <i class="fas fa-expand me-1"></i> Full Screen
                            </button>
                        </div>
                        
                        <div class="scanner-footer text-center p-2">
                            <small class="text-muted">
                                <i class="fas fa-info-circle me-1"></i> Position the book barcode within the frame
                            </small>
                        </div>
                    </div>
                    
                    <!-- Form Fields -->
                    <div class="form-section">
                        <div class="mb-3">
                            <label class="form-label">Scanned Book Barcode</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-barcode"></i></span>
                                <input type="text" name="scanner" id="scannerInput" class="form-control" readonly required>
                            </div>
                            <small class="text-muted">This field will be automatically populated when a barcode is scanned</small>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Book Title</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-book"></i></span>
                                <input type="text" name="title" id="titleInput" class="form-control" placeholder="Enter book title" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Author</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user-edit"></i></span>
                                <input type="text" name="author" class="form-control" placeholder="Enter author name" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Publication Year</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-calendar-alt"></i></span>
                                <input type="number" name="year" class="form-control" placeholder="Enter publication year" min="1000" max="2100" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Publisher</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-building"></i></span>
                                <input type="text" name="publisher" class="form-control" placeholder="Enter publisher name" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Department</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-university"></i></span>
                                <input type="text" name="department" class="form-control" placeholder="Enter department ,eg:IT,CSE,AI&DS" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Abstract</label>
                            <textarea name="abstract" class="form-control" placeholder="Enter book abstract" rows="4" required></textarea>
                        </div>
                    </div>
                    
                    <!-- Submit Button -->
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'available' %}" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left me-1"></i> Back to Books
                        </a>
                        <button type="submit" class="btn btn-success px-4">
                            <i class="fas fa-plus-circle me-1"></i> Add Book
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const startBtn = document.getElementById('startScanner');
            const stopBtn = document.getElementById('stopScanner');
            const fullscreenBtn = document.getElementById('fullscreenScanner');
            const scannerStatus = document.getElementById('scannerStatus');
            const scannerInput = document.getElementById('scannerInput');
            const titleInput = document.getElementById('titleInput');
            const cameraContainer = document.getElementById('camera');
            const scannerContainer = document.querySelector('.scanner-container');
            let lastResult = null;
            let isScannerActive = false;
            let isFullscreen = false;
            
            function updateScannerStatus(message, isError = false) {
                scannerStatus.textContent = message;
                scannerStatus.style.color = isError ? '#e74c3c' : 'white';
            }
            
            function startScanner() {
                if (isScannerActive) return;
                
                Quagga.init({
                    inputStream: {
                        type: "LiveStream",
                        target: cameraContainer,
                        constraints: {
                            width: { min: 640 },
                            height: { min: 480 },
                            facingMode: "environment",
                            aspectRatio: { min: 1, max: 2 }
                        }
                    },
                    decoder: {
                        readers: ["code_128_reader", "code_39_reader"],
                    },
                    locator: {
                        patchSize: "medium",
                        halfSample: true
                    },
                    locate: true
                }, function(err) {
                    if (err) {
                        console.error("Quagga init error:", err);
                        updateScannerStatus("Camera initialization failed", true);
                        alert("Camera initialization failed. Please allow camera permissions and try again.");
                        return;
                    }
                    
                    Quagga.start();
                    isScannerActive = true;
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    updateScannerStatus("Scanner active - looking for barcodes");
                });
            }
            
            function stopScanner() {
                if (!isScannerActive) return;
                
                Quagga.stop();
                isScannerActive = false;
                startBtn.disabled = false;
                stopBtn.disabled = true;
                updateScannerStatus("Scanner stopped");
            }
            
            function toggleFullscreen() {
                if (isFullscreen) {
                    // Exit fullscreen
                    document.exitFullscreen().catch(err => {
                        console.error("Error exiting fullscreen:", err);
                    });
                    scannerContainer.classList.remove('fullscreen-scanner');
                    fullscreenBtn.innerHTML = '<i class="fas fa-expand me-1"></i> Full Screen';
                    isFullscreen = false;
                } else {
                    // Enter fullscreen
                    scannerContainer.requestFullscreen().catch(err => {
                        console.error("Error entering fullscreen:", err);
                    });
                    scannerContainer.classList.add('fullscreen-scanner');
                    fullscreenBtn.innerHTML = '<i class="fas fa-compress me-1"></i> Exit Full Screen';
                    isFullscreen = true;
                }
            }
            
            Quagga.onDetected(function(result) {
                let code = result.codeResult.code;
                if (code && code !== lastResult) {
                    lastResult = code;
                    scannerInput.value = code;
                    
                    // Visual feedback
                    scannerInput.style.backgroundColor = '#d4edda';
                    setTimeout(() => {
                        scannerInput.style.backgroundColor = '';
                    }, 1000);
                    
                    updateScannerStatus("Barcode detected: " + code);
                    
                    // Auto-focus to title field after scan
                    setTimeout(() => {
                        titleInput.focus();
                    }, 500);
                    
                    // If in fullscreen, exit after successful scan
                    if (isFullscreen) {
                        toggleFullscreen();
                    }
                }
            });
            
            // Event listeners
            startBtn.addEventListener('click', startScanner);
            stopBtn.addEventListener('click', stopScanner);
            fullscreenBtn.addEventListener('click', toggleFullscreen);
            
            // Auto-start scanner on page load
            setTimeout(startScanner, 500);
            
            // Handle fullscreen change events
            document.addEventListener('fullscreenchange', function() {
                if (!document.fullscreenElement) {
                    scannerContainer.classList.remove('fullscreen-scanner');
                    fullscreenBtn.innerHTML = '<i class="fas fa-expand me-1"></i> Full Screen';
                    isFullscreen = false;
                }
            });
            
            // Prevent Enter from submitting early
            document.querySelectorAll("#bookForm input").forEach(input => {
                input.addEventListener("keydown", function(e) {
                    if (e.key === "Enter") {
                        e.preventDefault();
                        const focusable = Array.from(document.querySelectorAll("#bookForm input, #bookForm textarea"));
                        const index = focusable.indexOf(this);
                        if (index > -1 && index + 1 < focusable.length) {
                            focusable[index + 1].focus();
                        }
                    }
                });
            });
        });
    </script>
</body>
</html>
