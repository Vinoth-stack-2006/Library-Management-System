<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donate Book</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
body { 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
}
.card { 
    max-width: 700px; 
    margin: 2rem auto; 
    padding: 2rem; 
    border-radius: 1rem; 
    border: none;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
}
#camera { 
    width: 100%; 
    height: 300px; 
    border: 2px solid #ddd; 
    border-radius: 0.5rem; 
    overflow: hidden; 
    position: relative;
    background-color: #000;
    touch-action: pan-y;
}
#camera video, #camera canvas { 
    width: 100% !important; 
    height: 100% !important; 
    object-fit: cover; 
    position: absolute;
    top: 0;
    left: 0;
}
.camera-indicator {
    position: absolute;
    top: 10px;
    right: 10px;
    background-color: rgba(0, 0, 0, 0.7);
    color: white;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 6px;
}
.swipe-hint {
    position: absolute;
    bottom: 10px;
    left: 0;
    right: 0;
    text-align: center;
    color: white;
    font-size: 12px;
    background-color: rgba(0, 0, 0, 0.5);
    padding: 5px;
    z-index: 10;
}
.scanner-controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 15px;
}
.scanner-controls button {
    border-radius: 6px;
    padding: 8px 15px;
    font-size: 0.9rem;
}
.flash {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: white;
    opacity: 0;
    z-index: 5;
    pointer-events: none;
}
.flash-active {
    animation: flash 0.3s;
}
@keyframes flash {
    0% { opacity: 0; }
    50% { opacity: 0.7; }
    100% { opacity: 0; }
}
.form-control:focus, .form-select:focus {
    border-color: #667eea;
    box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
}
.btn-primary {
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none;
    padding: 12px;
    font-weight: 600;
}
.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}
@media (max-width: 768px) {
    .card {
        margin: 1rem auto;
        padding: 1.5rem;
    }
    #camera {
        height: 250px;
    }
}
@media (max-width: 576px) {
    body {
        padding: 10px;
    }
    .scanner-controls {
        flex-direction: column;
    }
    .scanner-controls button {
        width: 100%;
    }
}
</style>
</head>
<body>

<div class="card shadow">
<h2 class="text-center mb-4">🎁 Donate a Book</h2>

<form method="post" id="donateForm">
    {% csrf_token %}

    <!-- Scanner ID -->
    <div class="mb-3">
        <label for="scanner_id" class="form-label">Scanner ID</label>
        <input type="text" id="scanner_id" name="scanner_id" class="form-control" readonly required>
    </div>

    <!-- Webcam -->
    <div class="mb-3">
        <label class="form-label">Barcode Scanner</label>
        <div id="camera">
            <span class="text-white position-absolute top-50 start-50 translate-middle">📷 Initializing camera...</span>
            <div class="camera-indicator">
                <span id="cameraIcon">📷</span>
                <span id="cameraType">Rear Camera</span>
            </div>
            <div class="swipe-hint">Swipe left/right to switch camera</div>
            <div class="flash" id="flashEffect"></div>
        </div>
        
        <div class="scanner-controls">
            <button type="button" id="switchCameraBtn" class="btn btn-outline-primary">
                <span>🔄 Switch Camera</span>
            </button>
            <button type="button" id="restartScannerBtn" class="btn btn-outline-secondary">
                <span>🔄 Restart Scanner</span>
            </button>
        </div>
    </div>

    <!-- Book Details -->
    <div class="mb-3"><label>Title</label><input type="text" name="title" class="form-control" required></div>
    <div class="mb-3"><label>Author</label><input type="text" name="author" class="form-control" required></div>
    <div class="mb-3"><label>Year</label><input type="number" name="year" class="form-control" min="1000" max="2100"></div>
    <div class="mb-3"><label>Publisher</label><input type="text" name="publisher" class="form-control"></div>
    <div class="mb-3"><label>Department</label><input type="text" name="department" class="form-control"></div>
    <div class="mb-3"><label>Abstract</label><textarea name="abstract" class="form-control" rows="3"></textarea></div>
    <div class="mb-3">
        <label>Available</label>
        <select name="available" class="form-select">
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>
    </div>

    <!-- Donor Details -->
    <div class="mb-3"><label>Donor Name</label><input type="text" name="donor_name" class="form-control" required></div>
    <div class="mb-3">
        <label>Donor Type</label>
        <select name="donor_type" class="form-select" required>
            <option value="">Select Type</option>
            <option>Alumni</option>
            <option>Publisher</option>
            <option>Organisation</option>
        </select>
    </div>
    <div class="mb-3"><label>Donor Email</label><input type="email" name="donor_email" class="form-control"></div>
    <div class="mb-3"><label>Donor Phone</label><input type="text" name="donor_phone" class="form-control"></div>
    <div class="mb-3"><label>Donor ID</label><input type="text" name="donor_id" class="form-control"></div>
    <div class="mb-3"><label>Donation Date</label><input type="date" name="donation_date" class="form-control"></div>
    <div class="mb-3">
        <label>Remarks</label>
        <select name="remarks" class="form-select" required>
            <option value="">Select Remark</option>
            <option>Useful for students</option>
            <option>Complementary book</option>
            <option>To reach more people</option>
            <option>Not useful to me</option>
            <option>Old book</option>
            <option>Other</option>
        </select>
    </div>

    <button type="submit" class="btn btn-primary w-100">Submit Donation</button>
</form>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    let currentCamera = "environment"; // Default to rear camera
    let isSwitching = false;
    let startX = 0;
    let scanned = false;
    
    const cameraElement = document.getElementById('camera');
    const cameraTypeElement = document.getElementById('cameraType');
    const cameraIconElement = document.getElementById('cameraIcon');
    const switchCameraBtn = document.getElementById('switchCameraBtn');
    const restartScannerBtn = document.getElementById('restartScannerBtn');
    const flashEffect = document.getElementById('flashEffect');
    
    // Initialize Quagga with the current camera
    function initScanner(cameraMode) {
        if (isSwitching) return;
        isSwitching = true;
        
        // Stop any existing scanner
        if (typeof Quagga !== 'undefined' && Quagga.initialized) {
            Quagga.stop();
        }
        
        // Update camera indicator
        if (cameraMode === "environment") {
            cameraTypeElement.textContent = "Rear Camera";
            cameraIconElement.textContent = "📷";
        } else {
            cameraTypeElement.textContent = "Front Camera";
            cameraIconElement.textContent = "📱";
        }
        
        Quagga.init({
            inputStream: {
                type: "LiveStream",
                target: cameraElement,
                constraints: { 
                    width: 640, 
                    height: 300, 
                    facingMode: cameraMode 
                }
            },
            decoder: { 
                readers: ["code_128_reader","code_39_reader"] 
            },
            locate: true
        }, function(err) {
            isSwitching = false;
            if (err) { 
                console.error(err); 
                alert("Camera initialization failed. Please allow camera permissions.");
                return; 
            }
            Quagga.start();
            scanned = false; // Reset scanned flag when restarting
        });
    }
    
    // Switch camera function
    function switchCamera() {
        currentCamera = currentCamera === "environment" ? "user" : "environment";
        initScanner(currentCamera);
    }
    
    // Restart scanner function
    function restartScanner() {
        scanned = false;
        if (typeof Quagga !== 'undefined' && Quagga.initialized) {
            Quagga.start();
        }
    }
    
    // Touch events for swipe detection
    cameraElement.addEventListener('touchstart', function(e) {
        startX = e.touches[0].clientX;
    }, false);
    
    cameraElement.addEventListener('touchend', function(e) {
        if (!startX) return;
        
        const endX = e.changedTouches[0].clientX;
        const diffX = startX - endX;
        
        // If horizontal swipe with sufficient distance
        if (Math.abs(diffX) > 50) {
            switchCamera();
        }
        
        startX = 0;
    }, false);
    
    // Double-click to switch camera (for non-touch devices)
    cameraElement.addEventListener('click', function(e) {
        if (e.detail === 2) {
            switchCamera();
        }
    }, false);
    
    // Button event listeners
    switchCameraBtn.addEventListener('click', switchCamera);
    restartScannerBtn.addEventListener('click', restartScanner);
    
    // Initialize with default camera
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        initScanner(currentCamera);
    } else {
        alert("Camera not supported or permission denied.");
    }

    // Barcode detection
    Quagga.onDetected(function(result) {
        if (!scanned && result && result.codeResult && result.codeResult.code) {
            document.getElementById('scanner_id').value = result.codeResult.code;
            scanned = true;
            
            // Add flash effect for visual feedback
            flashEffect.classList.add('flash-active');
            setTimeout(() => {
                flashEffect.classList.remove('flash-active');
            }, 300);
            
            // Stop scanner after successful scan
            Quagga.stop();
        }
    });
});
</script>

</body>
</html>
