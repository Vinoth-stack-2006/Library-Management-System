<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Newspaper</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <h2>📰 Upload Newspaper</h2>

  <!-- Upload Form -->
  <form method="post" enctype="multipart/form-data" class="p-3 border rounded bg-light mb-4">
    {% csrf_token %}
    
    <div class="mb-3">
      <label class="form-label">Brand</label>
      {{ form.brand }}
    </div>

    <div class="mb-3">
      <label class="form-label">Language</label>
      {{ form.language }}
    </div>

    <div class="mb-3">
      <label class="form-label">Publish Date</label>
      {{ form.publish_date }}
    </div>

    <div class="mb-3">
      <label class="form-label">File (PDF/Image)</label>
      {{ form.file }}
    </div>

    <button type="submit" class="btn btn-primary">Upload</button>
  </form>

  <!-- Button to view existing newspapers -->
  <a href="{% url 'newspaper_list' %}" class="btn btn-secondary">
    View Existing Newspapers
  </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
