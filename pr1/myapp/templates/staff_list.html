<!DOCTYPE html>
<html>
<head>
    <title>Staff List</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f9fafb; padding: 30px; }
        table {
            border-collapse: collapse; width: 80%; margin: auto;
            background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        th, td {
            border: 1px solid #ddd; padding: 10px; text-align: left;
        }
        th { background: #4f46e5; color: white; }
        tr:nth-child(even) { background: #f3f4f6; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">Staff List</h2>
    <table>
        <tr>
            <th>Staff ID</th>
            <th>Name</th>
            <th>Email</th>
        </tr>
        {% for staff in staffs %}
        <tr>
            <td>{{ staff.staff_id }}</td>
            <td>{{ staff.name }}</td>
            <td>{{ staff.email }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="3">No staff available</td></tr>
        {% endfor %}
    </table>
</body>
</html>
