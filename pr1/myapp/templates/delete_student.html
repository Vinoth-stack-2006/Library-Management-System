<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>👨‍🎓 Students Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- for phone scaling -->
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.datatables.net/2.3.4/css/dataTables.dataTables.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/buttons/3.2.5/css/buttons.dataTables.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/responsive/3.0.3/css/responsive.dataTables.min.css">

  <style>
    body {
      background-color: #f8f9fa;
      padding: 20px;
    }
    .card {
      border-radius: 10px;
    }
    /* small screen styling */
    @media (max-width: 576px) {
      h3 {
        font-size: 1.2rem;
        text-align: center;
      }
      .dataTables_wrapper .dt-buttons {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 10px;
      }
    }
  </style>
</head>

<body>

  <div class="container-fluid">
    <div class="card shadow-lg">
      <div class="card-header bg-secondary text-white text-center">
        <h3 class="mb-0">👨‍🎓 Students Details</h3>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table id="example" class="display nowrap table table-striped" style="width:100%">
            <thead>
              <tr>
                <th>Student ID</th>
                <th>Student Name</th>
                <th>Delete</th>
              </tr>
            </thead>
            <tbody>
              {% for sd1 in data %}
              <tr>
                <td>{{ sd1.student_id }}</td>
                <td>{{ sd1.student_name }}</td>
                <td><a class="btn btn-sm btn-danger" href="/delete1/{{ sd1.id }}">Delete</a></td>
              </tr>
              {% empty %}
              <tr>
                <td colspan="3" class="text-center text-muted">No students available.</td>
              </tr>
              {% endfor %}
            </tbody>
            <tfoot>
              <tr>
                <th>Student ID</th>
                <th>Student Name</th>
                <th>Delete</th>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- JS Scripts -->
  <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
  <script src="https://cdn.datatables.net/2.3.4/js/dataTables.js"></script>
  <script src="https://cdn.datatables.net/responsive/3.0.3/js/dataTables.responsive.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/3.2.5/js/dataTables.buttons.js"></script>
  <script src="https://cdn.datatables.net/buttons/3.2.5/js/buttons.dataTables.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
  <script src="https://cdn.datatables.net/buttons/3.2.5/js/buttons.html5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/3.2.5/js/buttons.print.min.js"></script>

  <script>
    new DataTable('#example', {
      responsive: true,
      layout: {
        topStart: {
          buttons: ['copy', 'csv', 'excel', 'pdf', 'print']
        }
      }
    });
  </script>

</body>
</html>
